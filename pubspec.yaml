name: cortex
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.9.2
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.0.1
  flutter_riverpod: ^3.1.0
  dio: ^5.9.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  google_fonts: ^8.0.1
  hugeicons: ^1.1.5
  path_provider: ^2.1.5
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  image_picker: ^1.2.2
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.2.0
  encrypt: ^5.0.3
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  freezed: ^3.2.2
  build_runner: ^2.13.1
  json_serializable: ^6.13.1
  isar_community_generator: ^3.3.2
  mocktail: ^1.0.5

flutter:
  uses-material-design: true

